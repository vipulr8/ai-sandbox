services:
  claude:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_MAJOR: 22
        GO_VERSION: "1.24.2"
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
        CLAUDE_VERSION: ${CLAUDE_VERSION:-latest}
    image: ai-sandbox:${CLAUDE_VERSION_TAG:-latest}
    container_name: ai-sandbox
    hostname: ai-sandbox

    stdin_open: true
    tty: true

    volumes:
      # Mount your project directory
      - ${PROJECT_DIR:-.}:/home/coder/project

      # Persistent Claude state (credentials, session history, .claude.json).
      # Override with: CLAUDE_DIR=/some/host/path docker compose run --rm claude
      # Default mirrors run.sh/dev.sh's auto-persist behavior so a single login
      # survives across container runs. NOTE: docker-compose does not expand
      # `~`, so we use $HOME here.
      - ${CLAUDE_DIR:-${HOME}/.ai-sandbox/compose}:/home/coder/.claude

      # Optional: Docker socket (Colima or standard)
      # Uncomment to enable container-in-container:
      # - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock

      # Optional: AWS SSO config/cache (host login, shared cache). Compose
      # equivalent of AWS_SSO=1. Uncomment to enable. $HOME (not ~) required.
      # - ${AWS_DIR:-${HOME}/.aws}:/home/coder/.aws

    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-}
      - DISABLE_AUTOUPDATER=1
      - TERM=${TERM:-xterm-256color}
      # gh auth: compose can't run `gh auth token` itself. Export it first:
      #   export GH_TOKEN=$(gh auth token)   # then: docker compose run --rm claude
      - GH_TOKEN=${GH_TOKEN:-}

    working_dir: /home/coder/project

  # Launch Claude Code directly: docker compose --profile interactive run claude-interactive
  claude-interactive:
    extends:
      service: claude
    container_name: ai-sandbox-interactive
    command: ["claude"]
    profiles:
      - interactive

