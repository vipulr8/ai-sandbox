name: Publish container image

on:
  # Push: build on every main push and every cc-* / v* tag.
  # No `paths` filter — GitHub applies it to tag pushes too, which would
  # silently skip release tags whose commit didn't touch the listed files.
  # GHA cache + weekly schedule make unchanged-source rebuilds cheap.
  push:
    branches: [main]
    tags:
      - 'cc-*'
      - 'v*'
  # PRs: only build when image-relevant files change (saves CI time on
  # README/docs PRs).
  pull_request:
    paths:
      - Dockerfile
      - .dockerignore
      - entrypoint.sh
      - container-settings.json
      - container-hooks/**
      - .github/workflows/publish.yml
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      claude_version:
        description: 'Claude Code version to bake in (e.g. 2.1.98, or "latest")'
        default: latest
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: publish-${{ github.ref }}-${{ inputs.claude_version || 'auto' }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Claude Code version and image tag
        id: version
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME}" == cc-* ]]; then
            cv="${GITHUB_REF_NAME#cc-}"
            tag="cc-${cv}"
          elif [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            cv="latest"
            tag="latest"
          elif [[ -n "${INPUT_VERSION:-}" && "${INPUT_VERSION}" != "latest" ]]; then
            cv="${INPUT_VERSION}"
            tag="cc-${INPUT_VERSION}"
          else
            cv="latest"
            tag="latest"
          fi
          echo "claude_version=${cv}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Resolved: CLAUDE_VERSION=${cv}, image tag=${tag}"
        env:
          INPUT_VERSION: ${{ inputs.claude_version }}

      - name: Lowercase image name
        id: img
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}
          tags: |
            type=raw,value=${{ steps.version.outputs.image_tag }}
            type=sha,prefix=sha-,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=ref,event=tag,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CLAUDE_VERSION=${{ steps.version.outputs.claude_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
